name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        jellyfin-version: ["10.11.5", "10.11.6"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '<Version>' src/Jellyfin.Plugin.HomeScreenSections/Jellyfin.Plugin.HomeScreenSections.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          dotnet build src/Jellyfin.Plugin.HomeScreenSections/Jellyfin.Plugin.HomeScreenSections.csproj \
            -c Release \
            -p:JellyfinVersion=${{ matrix.jellyfin-version }}

      - name: Package
        run: |
          BUILD_DIR=src/Jellyfin.Plugin.HomeScreenSections/bin/Release/net9.0
          cd "$BUILD_DIR"
          zip -r "$GITHUB_WORKSPACE/Release-${{ matrix.jellyfin-version }}.zip" \
            Jellyfin.Plugin.HomeScreenSections.dll \
            0Harmony.dll \
            Newtonsoft.Json.dll \
            SkiaSharp.dll \
            logo.png \
            2>/dev/null || zip -r "$GITHUB_WORKSPACE/Release-${{ matrix.jellyfin-version }}.zip" \
            Jellyfin.Plugin.HomeScreenSections.dll

      - name: Get checksum
        id: checksum
        run: |
          echo "md5=$(md5sum Release-${{ matrix.jellyfin-version }}.zip | awk '{print toupper($1)}')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: Release-${{ matrix.jellyfin-version }}.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.jellyfin-version }}
          path: |
            Release-${{ matrix.jellyfin-version }}.zip

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '<Version>' src/Jellyfin.Plugin.HomeScreenSections/Jellyfin.Plugin.HomeScreenSections.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate manifest
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S")
          VERSION=${{ steps.version.outputs.version }}
          MD5_11_5=$(md5sum checksum-10.11.5/Release-10.11.5.zip | awk '{print toupper($1)}')
          MD5_11_6=$(md5sum checksum-10.11.6/Release-10.11.6.zip | awk '{print toupper($1)}')
          cat > manifest.json << EOF
          [
            {
              "guid": "b8298e01-2697-407a-b44d-aa8dc795e850",
              "name": "Home Screen Sections",
              "overview": "Adds support for server provided home screen sections (fixed fork)",
              "description": "Adds support for server provided home screen sections with OIDC compatibility fix",
              "owner": "michaelkuty",
              "category": "General",
              "versions": [
                {
                  "version": "${VERSION}",
                  "changelog": "Fix null crash when seerr user query returns no results",
                  "targetAbi": "10.11.5.0",
                  "sourceUrl": "https://github.com/michaelkuty/jellyfin-plugin-home-sections/releases/download/v${VERSION}/Release-10.11.5.zip",
                  "checksum": "${MD5_11_5}",
                  "timestamp": "${TIMESTAMP}"
                },
                {
                  "version": "${VERSION}",
                  "changelog": "Fix null crash when seerr user query returns no results",
                  "targetAbi": "10.11.6.0",
                  "sourceUrl": "https://github.com/michaelkuty/jellyfin-plugin-home-sections/releases/download/v${VERSION}/Release-10.11.6.zip",
                  "checksum": "${MD5_11_6}",
                  "timestamp": "${TIMESTAMP}"
                }
              ]
            }
          ]
          EOF

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: update manifest.json"
          git push
